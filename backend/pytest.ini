[pytest]
# PyTest Configuration for ThutoQuest AI Backend

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers for organizing tests
markers =
    integration: Integration tests
    unit: Unit tests
    domain: Domain layer tests
    infrastructure: Infrastructure layer tests
    api: API endpoint tests
    slow: Slow running tests

# Options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Async configuration
asyncio_mode = auto

# Coverage options
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
